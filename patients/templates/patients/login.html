<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>
<body>
    <header>
        <h1>Login to Your Account</h1>
    </header>
    <main>
        <form action="/login" method="POST" aria-label="Login Form">
            <label for="username">Username <span aria-hidden="true">*</span></label>
            <input type="text" id="username" name="username" required aria-required="true" placeholder="Enter your username">
            <label for="password">Password <span aria-hidden="true">*</span></label>
            <input type="password" id="password" name="password" required aria-required="true" placeholder="Enter your password">
            <button type="submit" aria-busy="false">Login</button>
            <p id="error-message" aria-live="polite" style="display: none;"></p>
        </form>
    </main>
    <footer>
        <p>© 2026 Hospital Management System</p>
    </footer>
    <script>
        const form = document.querySelector('form');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', (event) => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                event.preventDefault();
                errorMessage.textContent = 'Please fill in all required fields.';
                errorMessage.style.display = 'block';
                return;
            }
            // Indicate loading state
            const submitButton = event.target.querySelector('button[type="submit"]');
            submitButton.setAttribute('aria-busy', 'true');
        });
    </script>
</body>
</html>
