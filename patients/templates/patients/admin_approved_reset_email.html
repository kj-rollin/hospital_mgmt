<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Reset Approved</title>
</head>
<body>
    <p>Hello {{ user.username }},</p>
    <p>Your request to reset your password has been approved by an administrator.</p>
    <p>Please click the link below to reset your password. This link will expire in 1 hour.</p>
    <p><a href="{{ reset_link }}">{{ reset_link }}</a></p>
    <p>If you did not request this, please ignore this email.</p>
    <p>Thank you,<br>Hospital Management Team</p>
</body>
</html>
